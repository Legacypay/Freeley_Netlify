[build]
  command = "npm install && node build_blog.js"
  publish = "."

[build.processing]
  # Enable pretty URLs — strips .html from URLs
  # /weight-loss.html → serves at /weight-loss
  skip = false

[build.processing.html]
  pretty_urls = true

[functions]
  directory = "netlify/functions"

# ── MD Integrations Environment Variables ──────────────────────
# Set these in Netlify Dashboard > Site Settings > Environment Variables:
#
#   MDI_CLIENT_ID              - Partner Client ID from MD Integrations
#   MDI_CLIENT_SECRET          - Partner Client Secret (keep safe!)
#   MDI_BASE_URL               - API base URL (default: https://api.mdintegrations.com)
#   MDI_WEBHOOK_SECRET         - Secret for verifying incoming MDI webhooks
#   MDI_DEFAULT_PHARMACY_ID    - Default 503A compounding pharmacy ID
#   N8N_WEBHOOK_URL            - Your n8n/Make/Zapier webhook for notifications

# ── REDIRECTS ──────────────────────────────────────────────────
# 301 redirect .html URLs to clean URLs to prevent duplicate content
# This fixes the "Alternate page with proper canonical tag" error
# in Google Search Console.

# Force .html → clean URL (301 permanent redirect)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# Remove trailing slashes (prevent /page/ vs /page duplicates)
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301
  force = false

# ── Cache-Control Headers ──────────────────────────────────
# Ensures browsers always revalidate with Netlify instead of
# serving stale cached content after deployments.

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
