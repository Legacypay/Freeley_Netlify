name: "Broken Link Checker"

on:
  schedule:
    - cron: '0 0 * * 0' # Runs at midnight every Sunday
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run Lychee Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all html and markdown files in the repo
          args: --accept=200..204,429,500 --verbose --no-progress './**/*.md' './**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Issue for Failed Links
        if: steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🚨 Broken Links Detected"
          content-filepath: ./lychee/out.md
          labels: "bug, automated issue"
