name: Daily SEO Content Engine

on:
  schedule:
    - cron: '0 12 * * *' # Runs at 12 PM UTC (8 AM EST) every single day
  workflow_dispatch: # Allows you to click "Run workflow" manually on GitHub

jobs:
  write-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to commit the new files to your repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Auto-Refill Keyword Queue
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node refill-keywords.js

      - name: Run AI SEO Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node seo-agent.js

      - name: Build Blog HTML Pages
        run: node build_blog.js

      - name: Commit and Push New Article + Image
        run: |
          git config --global user.name "Freeley Auto-SEO Bot"
          git config --global user.email "bot@freeley.com"
          git add content/blog/*.md content/seo-keywords.txt
          git add assets/blog/
          git add *.html sitemap.xml
          git commit -m "🤖 Auto-SEO: new article + DALL-E hero image + rebuilt blog" || echo "No changes"
          git push
