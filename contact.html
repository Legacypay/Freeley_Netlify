<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Freeley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .page-hero {
      padding: 160px 0 100px;
      background-image: url("assets/brand/freeley_pattern_dark.jpg"); background-size: cover; background-position: center; color: white;
      color: #fff;
    }

    .page-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(48px, 6vw, 72px);
      font-weight: 300;
      margin-bottom: 24px;
      text-align: center;
    }

    .page-hero h1 em {
      font-style: italic;
      color: var(--green-light);
    }

    .contact-form-section {
      padding: 100px 0;
      max-width: 600px;
      margin: 0 auto;
    }

    .contact-input-group {
      margin-bottom: 20px;
    }

    .contact-input-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .contact-input-field, .contact-textarea {
      width: 100%;
      background: #fdfdfd;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .contact-textarea {
      resize: vertical;
      min-height: 120px;
    }

    .contact-input-field:focus, .contact-textarea:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(61, 140, 94, 0.1);
    }

    .submit-btn {
      width: 100%;
      background: var(--green-light);
      color: #fff;
      padding: 16px;
      border-radius: 50px;
      border: none;
      font-weight: 500;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: var(--green-bright);
    }
    
    .contact-info {
        text-align: center;
        margin-top: 64px;
        padding-top: 48px;
        border-top: 1px solid var(--border-light);
    }

    .contact-email {
        font-family: 'DM Sans', sans-serif;
        font-size: 20px;
        color: var(--green-light);
        text-decoration: none;
        font-weight: 500;
    }

  </style>
  <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
  <section class="page-hero">
    <div class="container reveal">
      <h1>Let's <em>connect</em></h1>
    </div>
  </section>

  <section class="contact-form-section">
    <div class="container reveal">
      <form id="contactForm">
        <div class="contact-input-group">
          <label class="contact-input-label">Full Name</label>
          <input class="contact-input-field" type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="contact-input-group">
          <label class="contact-input-label">Email Address</label>
          <input class="contact-input-field" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="contact-input-group">
          <label class="contact-input-label">Phone Number</label>
          <input class="contact-input-field" type="tel" id="phone" placeholder="(555) 555-5555" required>
        </div>
        <div class="contact-input-group">
          <label class="contact-input-label">Message</label>
          <textarea class="contact-textarea" id="message" placeholder="How can we help you?" required></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
      </form>

      <div class="contact-info">
        <p style="color:var(--text-muted);margin-bottom:12px;">Prefer to reach out directly?</p>
        <a href="mailto:Info@Freeley.com" class="contact-email">Info@Freeley.com</a>
      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDsNMEVdt5pc67o5xBBEgPvyukoUVGYE88",
      authDomain: "freeley-e7848.firebaseapp.com",
      projectId: "freeley-e7848",
      storageBucket: "freeley-e7848.firebasestorage.app",
      messagingSenderId: "1073740993306",
      appId: "1:1073740993306:web:caf7ff68bae0117c5b12a3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const originalText = btn.textContent;
        btn.textContent = 'Sending...';
        btn.disabled = true;

        const data = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            message: document.getElementById('message').value,
            timestamp: serverTimestamp()
        };

        try {
            await addDoc(collection(db, "contact_submissions"), data);
            btn.textContent = 'Message Sent!';
            btn.style.background = '#28a745';
            document.getElementById('contactForm').reset();
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = 'var(--green-light)';
                btn.disabled = false;
            }, 3000);
        } catch (error) {
            console.error("Error sending message:", error);
            btn.textContent = 'Error Sending';
            btn.style.background = '#dc3545';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = 'var(--green-light)';
                btn.disabled = false;
            }, 3000);
        }
    });

  </script>
  <script src="shared.js"></script>
  <script>
    initPage('');
  </script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</body>

</html>
