<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
      .wordmark { font-family: 'Playfair Display', 'GFS Bodoni', Georgia, serif; font-weight: 700; font-size: 72px; fill: #1B492D; }
      .f-letter  { font-family: 'Playfair Display', 'GFS Bodoni', Georgia, serif; font-weight: 700; font-size: 52px; fill: #1B492D; }
    </style>
  </defs>
  <rect width="520" height="120" fill="#F3EAE1" rx="0"/>
